general:
  players-only: "<red>Only players can use this command.</red>"
  world-overworld: "Overworld"
  world-nether: "Nether"
  world-end: "The End"

startup:
  loaded-config: "Loaded configuration."
  stopping: "Stopping SystemHomes!"
  home-disabled: "Home commands are disabled in config."
  tpa-disabled: "TPA commands are disabled in config."
  warp-disabled: "Warp commands are disabled in config."
  pwarp-disabled: "Player warp commands are disabled in config."

home:
  no-homes: "<gray>You have no homes yet. Use <white>/sethome <name></white> to create one."
  list-header: "<white>Your homes <dark_gray>({count}/{max})</dark_gray>: </white>"
  list-entry: "<aqua><click:run_command:'/home {name}'><hover:show_text:'<green>Click to teleport</green>'>{name}</hover></click></aqua>"
  list-separator: "<dark_gray>, </dark_gray>"
  invalid-name: "<red>Home names must be 1-16 chars and use only letters, numbers, _ or -.</red>"
  limit-reached: "<red>You reached the home limit <dark_gray>({max})</dark_gray>. Delete one first with <white>/delhome <name></white>.</red>"
  already-exists: "<yellow>Home <white>{name}</white> already exists.</yellow>\n<white><click:run_command:'/sethome {name} --force'><hover:show_text:'<yellow>Confirm overwriting home.</yellow>'><b>Click Here</b></hover></click></white><yellow> to overwrite home.</yellow>"
  created: "<green>Home <white>{name}</white> created."
  updated: "<yellow>Home <white>{name}</white> updated."
  save-failed: "<red>Could not save home right now. Please try again.</red>"
  invalid-name-short: "<red>Invalid home name.</red>"
  not-found: "<red>Home <white>{name}</white> does not exist.</red>"
  teleporting: "<green>Teleporting you to <white>{name}</white> in <white>{delay}</white> seconds.</green>"
  teleported: "<green>Teleported to <white>{name}</white>."
  teleport-failed: "<red>Teleport failed. The location may be invalid.</red>"
  delete-confirm: "<yellow>Are you sure you want to delete <white>{name}</white>?</yellow>\n<white><click:run_command:'/delhome {name} --force'><hover:show_text:'<yellow>Confirm deleting home.</yellow>'><b>Click Here</b></hover></click></white><yellow> to delete home.</yellow>"
  deleted: "<green>Deleted home <white>{name}</white>."

tpa:
  player-offline: "<yellow>Player is no longer online."
  accepted-tpa-there-accepter: "<yellow>TPA request from <white>{requester}</white> accepted.\nThey will be teleported in <white>{delay}</white> seconds."
  accepted-tpa-there-requester: "<yellow>TPA request to <white>{accepter}</white> accepted.\nYou will be teleported to them in <white>{delay}</white> seconds."
  accepted-tpa-here-accepter: "<yellow>TPA request from <white>{requester}</white> accepted.\nYou will be teleported in <white>{delay}</white> seconds."
  accepted-tpa-here-requester: "<yellow>TPA request to <white>{accepter}</white> accepted.\nThey will be teleported to you in <white>{delay}</white> seconds."
  denied-accepter: "<red>TPA request from <yellow>{requester}</yellow> denied."
  denied-requester: "<red>TPA request to <yellow>{accepter}</yellow> denied."
  cancelled-target: "<yellow>TPA request from <white>{requester}</white> has been cancelled."
  cancelled-all: "<yellow>All your outgoing TPA requests have been cancelled."
  no-outgoing: "<yellow>You don't have any outgoing TPA requests to cancel."
  self-request: "<red>You cannot send a TPA request to yourself."
  already-pending: "<red>You already have an outgoing TPA request to this person pending."
  request-sent: "<yellow>Teleport request sent to <white>{target}</white>.\nRequest will time out in <white>{timeout}</white> seconds."
  request-tpa-there: "<yellow><b><white>{requester}</white></b> is requesting to teleport <b>to you</b>:"
  request-tpa-here: "<yellow><b><white>{requester}</white></b> is requesting you to teleport <b>to them</b>:"
  request-actions: "<yellow>Click/Type <click:run_command:'/tpaccept {requester}'><hover:show_text:'<green>Accepts the TPA request.</green>'><b><green>/tpaccept {requester}</green></b></hover></click> to accept\nClick/Type <click:run_command:'/tpdeny {requester}'><hover:show_text:'<red>Denies the TPA request.</red>'><b><red>/tpdeny {requester}</red></b></hover></click> to deny."
  no-incoming: "<yellow>You don't have any incoming TPA requests."
  no-incoming-from: "<yellow>You don't have an incoming TPA request from <white>{requester}</white>."
  teleport-cancelled-offline: "<red>Teleport cancelled because the other player went offline.</red>"
  teleport-failed-to: "<red>Teleport to <white>{target}</white> failed.</red>"
  teleport-failed-for: "<red>Teleport for <white>{requester}</white> failed.</red>"
  timed-out-requester: "<yellow>TPA request to <white>{target}</white> has timed out."
  timed-out-target: "<yellow>TPA request from <white>{requester}</white> has timed out."

warp:
  no-warps: "<gray>There are no warps available.</gray>"
  list-header: "<gold>Server warps <dark_gray>({count})</dark_gray>:</gold><newline>"
  list-entry: "<yellow>{name}</yellow> <dark_gray>-</dark_gray> <aqua>({world}; {x}, {y}, {z})</aqua>"
  list-hover: "<yellow>Teleport to <white>{name}</white>.</yellow>"
  needs-name: "<red>Please give a name to this warp.</red>"
  overwrite-confirm: "<yellow>Warp <white>{name}</white> already exists.</yellow>\n<white><click:run_command:'/setwarp {name} --force'><hover:show_text:'<yellow>Click to overwrite this warp.</yellow>'><b>Click Here</b></hover></click></white><yellow> to overwrite it.</yellow>"
  set-success: "<green>Warp <white>{name}</white> has been set to this location!</green>"
  delete-not-found: "<red>This warp does not exist.</red>"
  delete-success: "<green>Warp <white>{name}</white> has been deleted!</green>"
  teleporting: "<green>Teleporting you to warp <white>{name}</white> in <white>{delay}</white> seconds.</green>"
  teleported: "<green>Teleported to warp <white>{name}</white>.</green>"
  teleport-failed: "<red>Teleport failed. The warp location may be invalid.</red>"
  not-found: "<red>Warp <white>{name}</white> does not exist.</red>"
  spawn-missing: "<red>The spawn warp does not exist yet.</red>"

pwarp:
  no-warps: "<gray>There are no player warps available.</gray>"
  list-header: "<gold>Player warps <dark_gray>({count})</dark_gray>:</gold>"
  list-entry: "<yellow>{name}</yellow> <dark_gray>-</dark_gray> <aqua>({owner}; {world}; {x}, {y}, {z})</aqua>"
  list-hover: "<yellow>Teleport to <white>{name}</white>.</yellow>"
  needs-name: "<red>Please give a name to this player warp.</red>"
  not-owned: "<red>You may not modify someone else's player warp.</red>"
  max-reached: "<red>You already have the maximum amount of player warps set <dark_gray>({max})</dark_gray>.</red>"
  overwrite-confirm: "<yellow>Player warp <white>{name}</white> already exists.</yellow>\n<white><click:run_command:'/setpwarp {name} --force'><hover:show_text:'<yellow>Click to overwrite this player warp.</yellow>'><b>Click Here</b></hover></click></white><yellow> to overwrite it.</yellow>"
  set-success: "<green>Player warp <white>{name}</white> has been set to this location!</green>"
  delete-not-found: "<red>This player warp does not exist.</red>"
  delete-success: "<green>Player warp <white>{name}</white> has been deleted!</green>"
  teleporting: "<green>Teleporting you to player warp <white>{name}</white> in <white>{delay}</white> seconds.</green>"
  teleported: "<green>Teleported to player warp <white>{name}</white>.</green>"
  teleport-failed: "<red>Teleport failed. The player warp location may be invalid.</red>"
  not-found: "<red>Player warp <white>{name}</white> does not exist.</red>"

update:
  available: "A new update is available: {latest} (you have {current})."
  latest: "You are running the latest version: {current}."
  failed: "Failed to check for updates."

migration:
  found-legacy: "Legacy SystemHomes-old data found. Importing homes, warps and player warps."
  imported-homes: "Imported {count} homes from SystemHomes-old."
  imported-warps: "Imported {count} warps from SystemHomes-old."
  imported-pwarps: "Imported {count} player warps from SystemHomes-old."

reload:
  success: "<green>Configuration reloaded successfully!</green>"
  failed: "<red>Failed to reload configuration. {error}.</red>"